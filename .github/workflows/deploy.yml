name: Deploy to AWS EC2

on:
  push:
    branches:
      - main  # Triggers on every push to main branch

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # ─── 1. Checkout Code (just to validate, actual deploy happens on EC2) ──
      - name: Checkout repository
        uses: actions/checkout@v4

      # ─── 2. SSH into EC2 and deploy directly from GitHub ─────────────────────
      - name: Deploy on EC2 via SSH
        uses: appleboy/ssh-action@v1.0.3
        with:
          host: ${{ secrets.EC2_HOST }}
          username: ${{ secrets.EC2_USER }}
          key: ${{ secrets.EC2_SSH_KEY }}
          script: |

            # ── If repo not cloned yet, clone it; otherwise pull latest ──
            if [ ! -d "/home/$USER/app/.git" ]; then
              git clone https://github.com/${{ secrets.GH_REPO }}.git /home/$USER/app
            else
              cd /home/$USER/app && git pull origin main
            fi

            # ── Move into project folder ──
            cd /home/$USER/app

            # ── Stop and remove old container if running ──
            docker stop credit-app || true
            docker rm credit-app   || true

            # ── Build fresh Docker image from repo code ──
            docker build -t credit-default-app:latest .

            # ── Run the new container ──
            docker run -d \
              --name credit-app \
              --restart always \
              -p 5000:5000 \
              credit-default-app:latest

            echo "✅ Deployment complete!"
